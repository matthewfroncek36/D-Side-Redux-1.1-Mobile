name: Multi-Platform Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  workflow_dispatch:
jobs:
  buildWindows:
    name: buildWindows
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Haxe
        uses: ShadowEngineTeam/setup-haxe@main
        with:
          haxe-version: 4.3.7

      - name: Install Haxelib
        run: |
          haxelib install hxpkg
          haxelib run hxpkg install

      - name: Compile
        run: haxelib run lime build windows

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: buildWindows
          path: export/release/windows/bin

  buildLinux:
    name: buildLinux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Haxe
        uses: ShadowEngineTeam/setup-haxe@main
        with:
          haxe-version: 4.3.7

      - name: Install Haxelib
        run: |
          haxelib install hxpkg
          haxelib run hxpkg install

      - name: Compile
        run: haxelib run lime build linux

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: buildLinux
          path: export/release/linux/bin

  buildMac:
    name: buildMac
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Haxe
        uses: ShadowEngineTeam/setup-haxe@main
        with:
          haxe-version: 4.3.7

      - name: Install Haxelib
        run: |
          haxelib install hxpkg
          haxelib run hxpkg install

      - name: Compile
        run: haxelib run lime build mac

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: buildMac
          path: export/release/mac/bin

  buildAndroid:
    name: buildAndroid
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Haxe
        uses: ShadowEngineTeam/setup-haxe@main
        with:
          haxe-version: 4.3.7

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      
      - name: Install Haxelib
        run: |
          haxelib install hxpkg
          haxelib run hxpkg install
      
      - name: Setup Lime
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_LATEST_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true
          
      - name: Compile
        run: haxelib run lime build android
      
      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: buildAndroid
          path: export/release/android/bin/app/build/outputs/apk/release/*.apk

  buildIosSimulator:
    name: buildIosSimulator
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Haxe
        uses: ShadowEngineTeam/setup-haxe@main
        with:
          haxe-version: 4.3.7

      - name: Install Haxelib
        run: |
          haxelib install hxpkg
          haxelib run hxpkg install

      - name: Compile
        run: haxelib run lime build ios -simulator

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: buildIosSimulator
          path: export/release/ios/bin
