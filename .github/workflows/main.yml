# FUCK MY LIFE BROOOOOOOOO.
name: Binaries

on: # Workflow triggers on both when a commit is pushed, or when a pull request is made.
    push:
        branches: 
            - main 
            - dev
    pull_request:
        branches:
            - main
            - dev
    
    workflow_dispatch: # Run workflow manually from the actions tab.
    workflow_call: #For release builds
        inputs:
            buildFlags:
                required: false
                type: string


jobs: # FUCK MY LIFE BROOOOO
    Windows:
        runs-on: windows-latest

        steps:
            - uses: actions/checkout@v6.0.2
            - uses: krdlab/setup-haxe@master

              with: 
                haxe-version: 4.3.7

            - name: Install libs
              run: |
                haxelib setup C:/haxelib
                haxelib install hxcpp > nul --quiet
                haxelib install hxpkg --quiet
                haxelib run hxpkg install
            - name: Installing a newer lime branch
              run: |
                haxelib remove lime
                haxelib git lime https://github.com/Psych-Slice/lime-mobile
                haxelib run lime rebuild windows 
            - name: Compile build
              run: haxelib run lime build windows -D ${{inputs.buildFlags}}
            - name: Publish artifact
              uses: actions/upload-artifact@v7.0.0
              with:
                name: NightmareVision (Windows)
                path: export/release/windows/bin
    #
    Linux:
        runs-on: ubuntu-22.04

        steps:
            - uses: actions/checkout@v6.0.2
            - uses: krdlab/setup-haxe@master

              with:
                haxe-version: 4.3.7
            
            - name: Install LibVLC
              run: |
                sudo apt-get install vlc libvlc-dev libvlccore-dev vlc-bin
            - name: Install libs
              run: |
                haxelib setup ~/haxelib
                haxelib install hxcpp > /dev/null --quiet
                haxelib install hxpkg --quiet
                haxelib run hxpkg install
            - name: Compile build
              run: haxelib run lime build Project.xml linux -D ${{inputs.buildFlags}}
            - name: Publish artifact
              uses: actions/upload-artifact@v7.0.0
              with:
                name: NightmareVision (Linux)
                path: 'export/release/linux/bin'
    macOS:
        runs-on: macos-latest

        steps:
            - uses: actions/checkout@v6.0.2
            - uses: krdlab/setup-haxe@master

              with:
                haxe-version: 4.3.7

            - name: Install libs
              run: |
                haxelib setup ~/haxelib
                haxelib install hxcpp > /dev/null --quiet
                haxelib install hxpkg --quiet
                haxelib run hxpkg install
            - name: Preserve Lime native binaries
              run: |
                LIME_RELEASE_PATH=$(haxelib path lime | head -n 1)
                cp -R "$LIME_RELEASE_PATH/ndll" "$RUNNER_TEMP/lime-ndll"
            - name: Installing a newer lime branch
              run: |
                haxelib remove lime
                haxelib git lime https://github.com/Psych-Slice/lime-mobile
                LIME_GIT_PATH=$(haxelib path lime | head -n 1)
                mkdir -p "$LIME_GIT_PATH/ndll"
                cp -R "$RUNNER_TEMP/lime-ndll/." "$LIME_GIT_PATH/ndll"
                haxelib run lime rebuild macos
            - name: Compile build
              run: haxelib run lime build Project.xml mac -D ${{inputs.buildFlags}}
            - name: Publish artifact
              uses: actions/upload-artifact@v7.0.0
              with:
                name: NightmareVision (macOS)
                path: export/release/macos/bin
    Android:
        runs-on: ubuntu-22.04

        steps:
            - uses: actions/checkout@v6.0.2
            - uses: actions/setup-java@v4
              with:
                distribution: temurin
                java-version: '17'
            - uses: android-actions/setup-android@v3
            - uses: krdlab/setup-haxe@master

              with:
                haxe-version: 4.3.7

            - name: Install Android SDK and NDK
              run: |
                yes | sdkmanager --licenses > /dev/null
                sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653"
                echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
                echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
            - name: Install libs
              run: |
                haxelib setup ~/haxelib
                haxelib install hxcpp > /dev/null --quiet
                haxelib install hxpkg --quiet
                haxelib run hxpkg install
            - name: Installing a newer lime branch
              run: |
                haxelib remove lime
                haxelib git lime https://github.com/Psych-Slice/lime-mobile
                LIME_GIT_PATH=$(haxelib path lime | head -n 1)
                mkdir -p "$LIME_GIT_PATH/ndll"
                cp -R "$RUNNER_TEMP/lime-ndll/." "$LIME_GIT_PATH/ndll"
                haxelib run lime rebuild android
            - name: Compile build
              run: haxelib run lime build Project.xml android -D ${{inputs.buildFlags}}
            - name: Publish artifact
              uses: actions/upload-artifact@v7.0.0
              with:
                name: NightmareVision (Android)
                path: export/release/android/bin/app/build/outputs/**/*.apk
    iOS:
        runs-on: macos-latest

        steps:
            - uses: actions/checkout@v6.0.2
            - uses: krdlab/setup-haxe@master

              with:
                haxe-version: 4.3.7

            - name: Install libs
              run: |
                haxelib setup ~/haxelib
                haxelib install hxcpp > /dev/null --quiet
                haxelib install hxpkg --quiet
                haxelib run hxpkg install
            - name: Preserve Lime native binaries
              run: |
                LIME_RELEASE_PATH=$(haxelib path lime | head -n 1)
                cp -R "$LIME_RELEASE_PATH/ndll" "$RUNNER_TEMP/lime-ndll"
            - name: Installing a newer lime branch
              run: |
                haxelib remove lime
                haxelib git lime https://github.com/Psych-Slice/lime-mobile
                LIME_GIT_PATH=$(haxelib path lime | head -n 1)
                mkdir -p "$LIME_GIT_PATH/ndll"
                cp -R "$RUNNER_TEMP/lime-ndll/." "$LIME_GIT_PATH/ndll"
                haxelib run lime rebuild ios
            - name: Compile build
              run: haxelib run lime build Project.xml ios -simulator -D ${{inputs.buildFlags}}
            - name: Publish artifact
              uses: actions/upload-artifact@v7.0.0
              with:
                name: NightmareVision (iOS Simulator)
                path: export/release/ios
