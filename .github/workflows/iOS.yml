name: Mobile-Ios

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  Build-iOS:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version
        id: ver
        run: |
          if git describe --tags --exact-match >/dev/null 2>&1; then
            echo "version=$(git describe --tags --exact-match)" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
          fi

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.6

      - name: Install Haxelib Dependencies
        run: |
          haxelib git hxcpp https://github.com/HaxeFoundation/hxcpp
          haxelib install thx.core
          haxelib install thx.semver
          haxelib install lime
          haxelib install openfl
          haxelib install flixel 5.2.2
          haxelib install flixel-tools 1.5.1
          haxelib install flixel-ui 2.5.0
          haxelib install flixel-addons 2.11.0
          haxelib install flxanimate
          haxelib install json2object
          haxelib git polymod https://github.com/PabloelproxD210/Polymod.git
          haxelib git hscript https://github.com/T5mpler/hscript-dnb
          haxelib install hxvlc 2.2.5
          haxelib git discord_rpc https://github.com/Aidan63/linc_discord-rpc
          haxelib install hxpkg --global
          haxelib run hxpkg setup --global
          haxelib run hxpkg install
          haxelib run lime rebuild hxcpp
          haxelib git hxcpp https://github.com/HaxeFoundation/hxcpp
          haxelib install thx.core
          haxelib install thx.semver
          haxelib install lime
          haxelib install openfl
          haxelib install flixel 5.2.2
          haxelib install flixel-tools 1.5.1
          haxelib install flixel-ui 2.5.0
          haxelib install flixel-addons 2.11.0
          haxelib install flxanimate
          haxelib install json2object
          haxelib git polymod https://github.com/PabloelproxD210/Polymod.git
          haxelib git hscript https://github.com/T5mpler/hscript-dnb
          haxelib install hxvlc 2.2.5
          haxelib git discord_rpc https://github.com/Aidan63/linc_discord-rpc

      # ============================================================
      # FIX XCODE 16.4 / iOS 18.5 ZLIB BUILD ERROR
      # fdopen macro breaks stdio.h, causing "expected identifier" error
      # ============================================================
      - name: Patch zlib for iOS build
        run: |
          echo "=== APPLYING zlib fdopen + OS_CODE FIX ==="

          ZUTIL=$(haxelib path hxcpp | head -n1)/project/thirdparty/zlib-1.2.11/zutil.h

          echo "Patching: $ZUTIL"

          # Fix fdopen macro conflict for Apple platforms
          sed -i.bak $'s/# *define fdopen(fd,mode) NULL/#ifndef __APPLE__\\\n#  define fdopen(fd,mode) NULL\\\n#endif/' "$ZUTIL"

          # Fix OS_CODE redefinition warning
          sed -i.bak $'s/#  define OS_CODE 19/#undef OS_CODE\\\n#  define OS_CODE 19/' "$ZUTIL"

          echo "=== zlib PATCH COMPLETE ==="

          # -----------------------------
          # Fix OS_CODE redefinition warning
          # -----------------------------
          sed -i.bak $'s/#  define OS_CODE 19/#undef OS_CODE\\\n#  define OS_CODE 19/' "$ZUTIL"

          echo "=== zlib PATCH COMPLETE ==="

      - name: Generate iOS C++
        run: |
          haxelib run lime build ios -nosign -DofficialBuild -DMOBILE_BUILD -D HXCPP_CPP11 || true

      - name: Patch thx.Nil automatically
        run: |
          echo "=== Running UNIVERSAL thx.Nil PATCHER ==="

          ROOTS=(
            "./export/ios/obj"
            "./bin/ios/D-Side Redux/haxe/build"
            "./bin/ios/D-Side Redux/haxe/build/Release-iphoneos-64"
          )

          patched=0

          for root in "${ROOTS[@]}"; do
            if [ ! -d "$root" ]; then
              continue
            fi

            # Find all C/C++/ObjC++ files and patch Nil → ThxNil
            while IFS= read -r -d '' file; do
              perl -pi -e 's/\bNil\b/ThxNil/g; s/thx::Nil/thx::ThxNil/g' "$file" && patched=$((patched+1))
            done < <(find "$root" -type f \( -name "*.h" -o -name "*.hpp" -o -name "*.cpp" -o -name "*.mm" \) -print0)
          done

          echo "Patched ${patched} file(s)."
          echo "=== Patch Completed ==="

      - name: Build iOS (Final)
        run: |
          haxelib run lime build ios -nosign -DofficialBuild -DMOBILE_BUILD -D HXCPP_CPP11

      - name: Package IPA
        run: |
          cd export/release/ios/build/*-iphoneos
          mkdir Payload
          mv *.app Payload/
          zip -r ~/ios-${{ steps.ver.outputs.version }}.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ~/ios-*.ipa
